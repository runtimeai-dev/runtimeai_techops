# 8. PQ Transit Shield (Port 8443)
# Uses the internal self-signed cert from cert-manager
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pq-transit-shield
  namespace: qutonomous
spec:
  replicas: 2
  selector: { matchLabels: { app: pq-transit-shield } }
  template:
    metadata:
      labels: { app: pq-transit-shield }
      annotations: { prometheus.io/scrape: "true", prometheus.io/port: "8443" }
    spec:
      tolerations: [ { key: "pqdata", operator: "Equal", value: "true", effect: "NoSchedule" } ]
      nodeSelector: { agentpool: pqdata }
      containers:
        - name: pq-transit-shield
          image: runtimeaicr.azurecr.io/qutonomous/pq-transit-shield:latest
          imagePullPolicy: Always
          ports: [ { containerPort: 8443 } ]
          envFrom:
            - secretRef: { name: qutonomous-app-secrets }
            - secretRef: { name: qutonomous-db-secrets }
          env:
            - name: TS_LISTEN
              value: ":8443"
            - name: TS_UPSTREAM
              value: "http://quantumvault.qutonomous.svc.cluster.local:8200"
            - name: TS_MODE
              value: "gateway"
            - name: TS_KEY_EXCHANGE
              value: "X25519MLKEM768"
            - name: ALLOW_CLASSICAL_FALLBACK
              value: "false"
            - name: ENFORCE_JWT
              value: "true"
            - name: QUANTUMVAULT_URL
              value: "http://quantumvault.qutonomous.svc.cluster.local:8200"
            - name: TLS_CERT_FILE
              value: "/certs/tls.crt"
            - name: TLS_KEY_FILE
              value: "/certs/tls.key"
          volumeMounts:
            - name: tls-certs
              mountPath: /certs
              readOnly: true
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits: { cpu: 200m, memory: 128Mi }
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8443
              scheme: HTTPS
            initialDelaySeconds: 15
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8443
              scheme: HTTPS
            initialDelaySeconds: 5
      volumes:
        - name: tls-certs
          secret:
            secretName: qutonomous-transit-shield-tls
---
apiVersion: v1
kind: Service
metadata:
  name: pq-transit-shield
  namespace: qutonomous
spec:
  selector: { app: pq-transit-shield }
  ports: [ { port: 8443, targetPort: 8443 } ]

