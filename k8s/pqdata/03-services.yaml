# =============================================================================
# Qutonomous Security Platform — Services
# Deploys the 8 core HTTP services.
# Assumes ARM64 images.
# =============================================================================

# --- Base Service Definitions ---
# Helper template for reusing common elements. We inline these in the actual YAML
# below to keep it pure Kubernetes manifest format.

---
# 1. QuantumVault (Port 8200)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: quantumvault
  namespace: qutonomous
spec:
  replicas: 2
  selector:
    matchLabels:
      app: quantumvault
  template:
    metadata:
      labels:
        app: quantumvault
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8200"
        prometheus.io/path: "/metrics"
    spec:
      tolerations:
        - key: "pqdata"
          operator: "Equal"
          value: "true"
          effect: "NoSchedule"
      nodeSelector:
        agentpool: pqdata
      containers:
        - name: quantumvault
          image: runtimeaicr.azurecr.io/qutonomous/quantumvault:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8200
          envFrom:
            - secretRef:
                name: qutonomous-app-secrets
            - secretRef:
                name: qutonomous-db-secrets
            # OPER_RT19-104 §J — license pubkey + LICENSE_SERVICE_URL.
            # Provide a runtimeai-license-pubkey ConfigMap in this namespace
            # (mirror of rt19's; same hex key value).
            - configMapRef:
                name: runtimeai-license-pubkey
                optional: true
          env:
            - name: MIGRATE_PATH
              value: "/app/migrations"
            - name: QV_PORT
              value: "8200"
            - name: QV_KEM_ALGORITHM
              value: "ML-KEM-1024"
            - name: QV_DSA_ALGORITHM
              value: "ML-DSA-87"
            - name: QV_AUDIT_ENABLED
              value: "true"
            - name: ENFORCE_JWT
              value: "true"
            # OPER_RT19-104 §B5 — license enforcement DISABLED until rollout.
            # Flip with: kubectl set env deploy/quantumvault -n qutonomous ENFORCE_LICENSE=true
            - name: ENFORCE_LICENSE
              value: "false"
            - name: RUNTIMEAI_LICENSE_KEY
              valueFrom:
                secretKeyRef:
                  name: runtimeai-license
                  key: license.jwt
                  optional: true
          volumeMounts:
            - name: license-file
              mountPath: /etc/runtimeai
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8200
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8200
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: license-file
          secret:
            secretName: runtimeai-license
            optional: true
            items:
              - key: license.jwt
                path: license.jwt
---
apiVersion: v1
kind: Service
metadata:
  name: quantumvault
  namespace: qutonomous
spec:
  selector:
    app: quantumvault
  ports:
    - port: 8200
      targetPort: 8200

