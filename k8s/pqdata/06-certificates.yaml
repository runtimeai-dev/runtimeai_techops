# =============================================================================
# Qutonomous Security Platform — TLS Certificates
# Managed by cert-manager (Let's Encrypt)
# =============================================================================

---
# Landing page wildcard certificate
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: qutonomous-landing-tls
  namespace: qutonomous
spec:
  secretName: qutonomous-landing-tls-cert
  dnsNames:
    - qutonomous.com
    - www.qutonomous.com
    - "*.qutonomous.com"
  issuerRef:
    kind: ClusterIssuer
    name: letsencrypt-prod
