# =============================================================================
# Qutonomous Security Platform — AutoScaling (HPA)
# Scales core crypto services based on CPU and memory utilization.
# =============================================================================

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: quantumvault-hpa
  namespace: qutonomous
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: quantumvault
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 75
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80

