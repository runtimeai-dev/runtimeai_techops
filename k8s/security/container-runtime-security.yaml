# Container Runtime Security (AppArmor, seccomp) — TOPS-031

apiVersion: v1
kind: ConfigMap
metadata:
  name: seccomp-profile
  namespace: rt19
data:
  runtime.json: |
    {
      "defaultAction": "SCMP_ACT_ERRNO",
      "syscalls": [
        {"names": ["read", "write", "exit", "exit_group", "futex"], "action": "SCMP_ACT_ALLOW"},
        {"names": ["socket", "bind", "listen", "accept4", "connect"], "action": "SCMP_ACT_ALLOW"},
        {"names": ["mmap", "mprotect", "brk"], "action": "SCMP_ACT_ALLOW"},
        {"names": ["ptrace", "process_vm_readv"], "action": "SCMP_ACT_ERRNO"}
      ]
    }

---
# Pod with seccomp enabled

apiVersion: v1
kind: Pod
metadata:
  name: secure-pod
  namespace: rt19
spec:
  securityContext:
    seccompProfile:
      type: Localhost
      localhostProfile: runtime.json
    runAsNonRoot: true
    runAsUser: 1000
    fsGroup: 2000
    capabilities:
      drop:
        - ALL
  containers:
    - name: app
      image: myapp:latest
      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        capabilities:
          drop:
            - ALL
