apiVersion: apps/v1
kind: Deployment
metadata:
  name: console
  namespace: runtimecrm
  labels:
    app: console
spec:
  replicas: 2
  selector:
    matchLabels:
      app: console
  template:
    metadata:
      labels:
        app: console
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - console
                topologyKey: kubernetes.io/hostname
      containers:
        - name: console
          image: runtimeaicr.azurecr.io/runtimecrm/console:latest
          ports:
            - containerPort: 80
          envFrom:
            - secretRef:
                name: console-secrets
            - configMapRef:
                name: console-config
          livenessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
