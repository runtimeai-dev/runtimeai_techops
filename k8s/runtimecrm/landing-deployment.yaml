apiVersion: apps/v1
kind: Deployment
metadata:
  name: landing
  namespace: runtimecrm
  labels:
    app: landing
spec:
  replicas: 2
  selector:
    matchLabels:
      app: landing
  template:
    metadata:
      labels:
        app: landing
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - landing
                topologyKey: kubernetes.io/hostname
      containers:
        - name: landing
          image: runtimeaicr.azurecr.io/runtimecrm/landing:latest
          ports:
            - containerPort: 80
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests: { cpu: "50m",  memory: "64Mi" }
            limits:   { cpu: "200m", memory: "128Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: landing
  namespace: runtimecrm
spec:
  selector:
    app: landing
  ports:
    - port: 80
      targetPort: 80
