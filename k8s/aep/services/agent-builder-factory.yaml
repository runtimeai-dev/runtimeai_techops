apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-builder-factory
  namespace: aep
  labels:
    app: agent-builder-factory
    app.kubernetes.io/part-of: runtimeai-aep
spec:
  replicas: 2
  selector:
    matchLabels:
      app: agent-builder-factory
  template:
    metadata:
      labels:
        app: agent-builder-factory
    spec:
      containers:
        - name: agent-builder-factory
          image: runtimeaicr.azurecr.io/aep/agent-builder-factory:latest
          ports:
            - containerPort: 8316
          envFrom:
            - configMapRef:
                name: aep-config
            - secretRef:
                name: aep-secrets
          env:
            - name: PORT
              value: "8316"
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8316
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8316
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: agent-builder-factory
  namespace: aep
spec:
  selector:
    app: agent-builder-factory
  ports:
    - port: 8316
      targetPort: 8316
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: agent-builder-factory-pdb
  namespace: aep
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: agent-builder-factory
