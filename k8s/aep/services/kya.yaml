apiVersion: apps/v1
kind: Deployment
metadata:
  name: kya
  namespace: aep
  labels:
    app: kya
    app.kubernetes.io/part-of: runtimeai-aep
spec:
  replicas: 2
  selector:
    matchLabels:
      app: kya
  template:
    metadata:
      labels:
        app: kya
    spec:
      containers:
        - name: kya
          image: runtimeaicr.azurecr.io/aep/kya:latest
          ports:
            - containerPort: 8301
          envFrom:
            - configMapRef:
                name: aep-config
            - secretRef:
                name: aep-secrets
          env:
            - name: PORT
              value: "8301"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8301
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8301
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: kya
  namespace: aep
spec:
  selector:
    app: kya
  ports:
    - port: 8301
      targetPort: 8301
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: kya-pdb
  namespace: aep
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: kya
