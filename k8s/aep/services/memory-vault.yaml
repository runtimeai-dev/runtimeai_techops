apiVersion: apps/v1
kind: Deployment
metadata:
  name: memory-vault
  namespace: aep
  labels:
    app: memory-vault
    app.kubernetes.io/part-of: runtimeai-aep
spec:
  replicas: 2
  selector:
    matchLabels:
      app: memory-vault
  template:
    metadata:
      labels:
        app: memory-vault
    spec:
      containers:
        - name: memory-vault
          image: runtimeaicr.azurecr.io/aep/memory-vault:latest
          ports:
            - containerPort: 8307
          envFrom:
            - configMapRef:
                name: aep-config
            - secretRef:
                name: aep-secrets
          env:
            - name: PORT
              value: "8307"
            # QuantumVault encryption ON: PutKey + audit-log SQL bugs fixed
            # in pq_data_platform PR (qv $13→$12, qv_audit_log.request_id
            # migration). Memory-vault lazy-provisions the per-tenant
            # ML-KEM-1024 key on first encrypt; QUANTUM_VAULT_URL falls
            # back to the value in aep-config when this entry is absent.
            - name: ENFORCE_QUANTUM_VAULT
              value: "true"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8307
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8307
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: memory-vault
  namespace: aep
spec:
  selector:
    app: memory-vault
  ports:
    - port: 8307
      targetPort: 8307
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: memory-vault-hpa
  namespace: aep
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: memory-vault
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: memory-vault-pdb
  namespace: aep
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: memory-vault
