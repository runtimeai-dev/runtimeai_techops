apiVersion: apps/v1
kind: Deployment
metadata:
  name: observability
  namespace: aep
  labels:
    app: observability
    app.kubernetes.io/part-of: runtimeai-aep
spec:
  replicas: 2
  selector:
    matchLabels:
      app: observability
  template:
    metadata:
      labels:
        app: observability
    spec:
      containers:
        - name: observability
          image: runtimeaicr.azurecr.io/aep/observability:latest
          ports:
            - containerPort: 8305
          envFrom:
            - configMapRef:
                name: aep-config
            - secretRef:
                name: aep-secrets
          env:
            - name: PORT
              value: "8305"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8305
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8305
            initialDelaySeconds: 5
            periodSeconds: 10
      imagePullSecrets:
        - name: acr-secret
---
apiVersion: v1
kind: Service
metadata:
  name: observability
  namespace: aep
spec:
  selector:
    app: observability
  ports:
    - port: 8305
      targetPort: 8305
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: observability-pdb
  namespace: aep
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: observability
