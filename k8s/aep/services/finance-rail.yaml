apiVersion: apps/v1
kind: Deployment
metadata:
  name: finance-rail
  namespace: aep
  labels:
    app: finance-rail
    app.kubernetes.io/part-of: runtimeai-aep
spec:
  replicas: 2
  selector:
    matchLabels:
      app: finance-rail
  template:
    metadata:
      labels:
        app: finance-rail
    spec:
      containers:
        - name: finance-rail
          image: runtimeaicr.azurecr.io/aep/finance-rail:latest
          ports:
            - containerPort: 8314
          envFrom:
            - configMapRef:
                name: aep-config
            - secretRef:
                name: aep-secrets
          env:
            - name: PORT
              value: "8314"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8314
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8314
            initialDelaySeconds: 5
            periodSeconds: 10
      imagePullSecrets:
        - name: acr-secret
---
apiVersion: v1
kind: Service
metadata:
  name: finance-rail
  namespace: aep
spec:
  selector:
    app: finance-rail
  ports:
    - port: 8314
      targetPort: 8314
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: finance-rail-pdb
  namespace: aep
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: finance-rail
