apiVersion: apps/v1
kind: Deployment
metadata:
  name: cost-control
  namespace: aep
  labels:
    app: cost-control
    app.kubernetes.io/part-of: runtimeai-aep
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cost-control
  template:
    metadata:
      labels:
        app: cost-control
    spec:
      containers:
        - name: cost-control
          image: runtimeaicr.azurecr.io/aep/cost-control:latest
          ports:
            - containerPort: 8302
          envFrom:
            - configMapRef:
                name: aep-config
            - secretRef:
                name: aep-secrets
          env:
            - name: PORT
              value: "8302"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8302
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8302
            initialDelaySeconds: 5
            periodSeconds: 10
      imagePullSecrets:
        - name: acr-secret
---
apiVersion: v1
kind: Service
metadata:
  name: cost-control
  namespace: aep
spec:
  selector:
    app: cost-control
  ports:
    - port: 8302
      targetPort: 8302
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: cost-control-pdb
  namespace: aep
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: cost-control
