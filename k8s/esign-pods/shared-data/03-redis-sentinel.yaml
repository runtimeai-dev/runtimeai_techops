# OPER_RT19-062: Redis Sentinel (master + replica + sentinel)
# Self-managed Redis HA in shared-data namespace.
# Session keys use esign:session:<id> — NO pod prefix — so sessions survive pod failover.
---
# ── Redis Master ─────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-master
  namespace: shared-data
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
      role: master
  template:
    metadata:
      labels:
        app: redis
        role: master
    spec:
      containers:
        - name: redis
          image: redis:7.2-alpine
          command: [redis-server, --requirepass, $(REDIS_PASSWORD), --appendonly, "yes"]
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-secrets
                  key: redis-password
          ports:
            - containerPort: 6379
          readinessProbe:
            exec:
              command: [redis-cli, -a, $(REDIS_PASSWORD), ping]
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: redis-data
              mountPath: /data
      volumes:
        - name: redis-data
          emptyDir: {}  # use PVC in production for persistence
---
apiVersion: v1
kind: Service
metadata:
  name: redis-master
  namespace: shared-data
spec:
  selector:
    app: redis
    role: master
  ports:
    - port: 6379
      targetPort: 6379
---
# ── Redis Replica ─────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-replica
  namespace: shared-data
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
      role: replica
  template:
    metadata:
      labels:
        app: redis
        role: replica
    spec:
      containers:
        - name: redis
          image: redis:7.2-alpine
          command:
            - redis-server
            - --replicaof
            - redis-master.shared-data.svc.cluster.local
            - "6379"
            - --requirepass
            - $(REDIS_PASSWORD)
            - --masterauth
            - $(REDIS_PASSWORD)
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-secrets
                  key: redis-password
          ports:
            - containerPort: 6379
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: redis-replica
  namespace: shared-data
spec:
  selector:
    app: redis
    role: replica
  ports:
    - port: 6379
      targetPort: 6379
---
# ── Redis Sentinel ────────────────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-sentinel-config
  namespace: shared-data
data:
  sentinel.conf: |
    sentinel resolve-hostnames yes
    sentinel announce-hostnames yes
    sentinel monitor esign-master redis-master.shared-data.svc.cluster.local 6379 1
    sentinel auth-pass esign-master SENTINEL_PLACEHOLDER_PASSWORD
    sentinel down-after-milliseconds esign-master 5000
    sentinel failover-timeout esign-master 10000
    sentinel parallel-syncs esign-master 1
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-sentinel
  namespace: shared-data
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis-sentinel
  template:
    metadata:
      labels:
        app: redis-sentinel
    spec:
      initContainers:
        - name: config-init
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              sed "s/SENTINEL_PLACEHOLDER_PASSWORD/${REDIS_PASSWORD}/" \
                /config/sentinel.conf > /sentinel/sentinel.conf
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-secrets
                  key: redis-password
          volumeMounts:
            - name: config
              mountPath: /config
            - name: sentinel-data
              mountPath: /sentinel
      containers:
        - name: sentinel
          image: redis:7.2-alpine
          command: [redis-sentinel, /sentinel/sentinel.conf]
          ports:
            - containerPort: 26379
              name: sentinel
          volumeMounts:
            - name: sentinel-data
              mountPath: /sentinel
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
      volumes:
        - name: config
          configMap:
            name: redis-sentinel-config
        - name: sentinel-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: redis-sentinel
  namespace: shared-data
spec:
  selector:
    app: redis-sentinel
  ports:
    - port: 26379
      targetPort: 26379
---
# Secret: redis-secrets — create via:
# kubectl create secret generic redis-secrets -n shared-data \
#   --from-literal=redis-password="$(openssl rand -base64 32)"
