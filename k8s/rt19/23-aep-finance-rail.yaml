---
apiVersion: v1
kind: Service
metadata:
  name: finance-rail
  namespace: aep
spec:
  type: ClusterIP
  ports:
  - port: 8314
    targetPort: 8314
  selector:
    app: finance-rail
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: finance-rail
  namespace: aep
spec:
  replicas: 2
  selector:
    matchLabels:
      app: finance-rail
  template:
    metadata:
      labels:
        app: finance-rail
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        fsGroup: 10001
      containers:
      - name: finance-rail
        image: runtimeaicr.azurecr.io/aep/finance-rail:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8314
        env:
        - name: PORT
          value: "8314"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: aep-postgres
              key: dsn
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: aep-secrets
              key: jwt-secret
        - name: ENFORCE_JWT
          value: "true"
        - name: COST_CONTROL_URL
          value: "http://cost-control.aep.svc.cluster.local:8302"
        - name: PII_SHIELD_URL
          value: "http://pii-shield.aep.svc.cluster.local:8304"
        - name: AUDIT_BLACK_BOX_URL
          value: "http://audit-black-box.aep.svc.cluster.local:8303"
        - name: COMMERCE_RAILS_URL
          value: "http://commerce-rails.aep.svc.cluster.local:8308"
        resources:
          requests:
            cpu: 150m
            memory: 192Mi
          limits:
            cpu: 1200m
            memory: 768Mi
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8314
          initialDelaySeconds: 15
          periodSeconds: 30
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - finance-rail
              topologyKey: kubernetes.io/hostname
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: finance-rail-hpa
  namespace: aep
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: finance-rail
  minReplicas: 2
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
