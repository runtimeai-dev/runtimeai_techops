# Cloud Security (Track 3) — rt19 manifests (CSEC-000..016)
#
# Pre-req in rt19:
#   - Postgres available via the shared rt19-postgres service.
#   - Secrets in the `cloud-security` Secret: DATABASE_URL, AUTH_JWT_ISSUER.
#   - auth-service + audit-black-box + ml-service already deployed.
---
apiVersion: v1
kind: Service
metadata:
  name: cloud-security-service
  namespace: rt19
  labels:
    app: cloud-security-service
    runtimeai.io/track: "3"
spec:
  selector:
    app: cloud-security-service
  ports:
    - name: http
      port: 8098
      targetPort: 8098
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloud-security-service
  namespace: rt19
  labels:
    app: cloud-security-service
    runtimeai.io/track: "3"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cloud-security-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: cloud-security-service
    spec:
      containers:
        - name: app
          image: runtimeaicr.azurecr.io/cloud-security-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8098
          env:
            - { name: PORT, value: "8098" }
            - { name: ENFORCE_JWT, value: "true" }
            - { name: ENFORCE_MIGRATIONS, value: "true" }
            - { name: RUNTIME_ENVIRONMENT, value: "production" }
            - name: DATABASE_URL
              valueFrom: { secretKeyRef: { name: cloud-security, key: DATABASE_URL } }
            - name: AUTH_JWT_ISSUER
              valueFrom: { secretKeyRef: { name: cloud-security, key: AUTH_JWT_ISSUER } }
            - { name: AUTH_JWKS_URL, value: "http://auth-svc:8097/.well-known/jwks.json" }
            - { name: ML_SERVICE_URL, value: "http://ml-intelligence-service:8095" }
            - { name: AUDIT_LOG_URL, value: "http://audit-black-box.aep.svc.cluster.local:8303" }
            - { name: CONTROL_PLANE_URL, value: "http://control-plane:8080" }
          readinessProbe:
            httpGet: { path: /readyz, port: 8098 }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /healthz, port: 8098 }
            initialDelaySeconds: 20
            periodSeconds: 30
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: cloud-security-console
  namespace: rt19
  labels:
    app: cloud-security-console
    runtimeai.io/track: "3"
spec:
  selector:
    app: cloud-security-console
  ports:
    - name: http
      port: 80
      targetPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloud-security-console
  namespace: rt19
  labels:
    app: cloud-security-console
    runtimeai.io/track: "3"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cloud-security-console
  template:
    metadata:
      labels:
        app: cloud-security-console
    spec:
      containers:
        - name: nginx
          image: runtimeaicr.azurecr.io/cloud-security-console:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet: { path: /, port: 80 }
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            requests: { cpu: 20m, memory: 32Mi }
            limits:   { cpu: 200m, memory: 128Mi }
