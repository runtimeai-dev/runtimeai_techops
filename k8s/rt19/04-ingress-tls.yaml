# LLM Proxy (proxy.rt19.runtimeai.io → vendor-wrapper)
# Agents/tools configured to use RuntimeAI as their AI API base URL.
# All traffic passes through OPA policy enforcement, budget tracking, and guardrails.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: proxy-ingress
  namespace: rt19
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: letsencrypt-prod
    # Allow large request bodies (LLM prompts can be large)
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    # Long timeouts for streaming LLM responses
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      more_set_headers "X-Frame-Options: DENY";
      more_set_headers "X-Content-Type-Options: nosniff";
    nginx.ingress.kubernetes.io/limit-rps: "60"
    nginx.ingress.kubernetes.io/limit-burst-multiplier: "3"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - proxy.rt19.runtimeai.io
      secretName: proxy-rt19-tls
  rules:
    - host: proxy.rt19.runtimeai.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: vw-proxy
                port:
                  number: 8103
---
# LLM Enforcer (enforcer.rt19.runtimeai.io → vendor-wrapper)
