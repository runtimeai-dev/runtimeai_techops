# Ingress + TLS for rt19
---
# cert-manager ClusterIssuer (Let's Encrypt production)
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: admin@runtimeai.io
    privateKeySecretRef:
      name: letsencrypt-prod-key
    solvers:
      - http01:
          ingress:
            class: nginx
---
# Main landing page (runtimeai.io)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: landing-ingress
  namespace: runtimeai-landing
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: letsencrypt-prod
    # Security headers (REQ-046, REQ-047, REQ-048)
    nginx.ingress.kubernetes.io/configuration-snippet: |
      more_set_headers "X-Frame-Options: DENY";
      more_set_headers "X-Content-Type-Options: nosniff";
      more_set_headers "Referrer-Policy: strict-origin-when-cross-origin";
      more_set_headers "Permissions-Policy: camera=(), microphone=(), geolocation=()";
      more_set_headers "Content-Security-Policy: default-src 'self'; script-src 'self' 'unsafe-inline' https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://api.rt19.runtimeai.io";
    nginx.ingress.kubernetes.io/hsts: "true"
    nginx.ingress.kubernetes.io/hsts-max-age: "31536000"
    nginx.ingress.kubernetes.io/hsts-include-subdomains: "true"
    nginx.ingress.kubernetes.io/hsts-preload: "true"
    # Rate limiting (REQ-042, REQ-108)
    nginx.ingress.kubernetes.io/limit-rps: "100"
    nginx.ingress.kubernetes.io/limit-burst-multiplier: "2"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - runtimeai.io
      secretName: runtimeai-io-tls
    - hosts:
        - www.runtimeai.io
      secretName: www-runtimeai-tls
  rules:
    - host: runtimeai.io
      http:
        paths:
          - path: /api/
            pathType: Prefix
            backend:
              service:
                name: landing-backend
                port:
                  number: 8081
          - path: /
            pathType: Prefix
            backend:
              service:
                name: website-singlepage
                port:
                  number: 80
    - host: www.runtimeai.io
      http:
        paths:
          - path: /api/
            pathType: Prefix
            backend:
              service:
                name: landing-backend
                port:
                  number: 8081
          - path: /
            pathType: Prefix
            backend:
              service:
                name: website-singlepage
                port:
                  number: 80
---
# NOTE: admin.runtimeai.io is now served by saas-admin-ingress in rt19 namespace
# (see saas-admin.yaml). The duplicate saas-admin-app in runtimeai-landing was
# removed to prevent deployment sync issues.
---
