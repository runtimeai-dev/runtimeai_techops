---
# Omni Command Center (omni.rt19.runtimeai.io)
# omni-shell (React UI on port 80) + omni-gateway API (/api/* on port 8100)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: omni-ingress
  namespace: rt19
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - omni.rt19.runtimeai.io
      secretName: omni-rt19-tls
  rules:
    - host: omni.rt19.runtimeai.io
      http:
        paths:
          # /api/auth/ must be listed before /api/ so the ingress routes auth
          # requests to omni-shell (which proxies to control-plane) rather than
          # directly to omni-gateway which has no auth endpoints.
          - path: /api/auth/
            pathType: Prefix
            backend:
              service:
                name: omni-shell
                port:
                  number: 80
          - path: /api/
            pathType: Prefix
            backend:
              service:
                name: omni-gateway
                port:
                  number: 8100
          - path: /
            pathType: Prefix
            backend:
              service:
                name: omni-shell
                port:
                  number: 80
---
