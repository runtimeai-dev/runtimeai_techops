---
apiVersion: v1
kind: Service
metadata:
  name: cost-control
  namespace: aep
  labels:
    app: cost-control
    service: cost-control
spec:
  type: ClusterIP
  ports:
  - port: 8302
    targetPort: 8302
    protocol: TCP
    name: http
  selector:
    app: cost-control
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cost-control
  namespace: aep
  labels:
    app: cost-control
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cost-control
  template:
    metadata:
      labels:
        app: cost-control
        version: v1
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        fsGroup: 10001
      containers:
      - name: cost-control
        image: runtimeaicr.azurecr.io/aep/cost-control:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8302
          name: http
        env:
        - name: PORT
          value: "8302"
        - name: LOG_LEVEL
          value: "info"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: aep-postgres
              key: dsn
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: aep-secrets
              key: jwt-secret
        - name: ENFORCE_JWT
          value: "true"
        - name: KYA_URL
          value: "http://kya.aep.svc.cluster.local:8301"
        - name: COST_LEDGER_URL
          value: "http://cost-ledger.runtimeai-enterprise.svc.cluster.local:8080"
        resources:
          requests:
            cpu: 150m
            memory: 192Mi
          limits:
            cpu: 1000m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8302
          initialDelaySeconds: 15
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8302
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 2
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - cost-control
              topologyKey: kubernetes.io/hostname
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: cost-control-hpa
  namespace: aep
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: cost-control
  minReplicas: 2
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
