            limits:   { cpu: 200m, memory: 128Mi }
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: quantum-ingress
  namespace: rt19
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
