# ═══════════════════════════════════════════════════════════════════════════════
# rt19 Platform Services
#
# DEPLOYMENT ORDER: Deploy AFTER 07-dataplane.yaml is validated
# PHASE: 2-4 (Tier 2-4 — Platform, Advanced, FedRAMP services)
#
# ⚠️ DEPLOY & TEST INCREMENTALLY:
#   1. Apply this manifest:  kubectl apply -f 08-platform-services.yaml
#   2. Wait for pods:        kubectl get pods -n rt19 -l tier=platform -w
#   3. Run smoke test:       ./smoke_test_rt19.sh --verbose
#   4. Only proceed after all pods are Running/Ready
#
# Services in this manifest:
#   Phase 2 — Platform:
#     - vendor-wrapper (OPA-enforced LLM vendor proxy)
#     - bot-ca (X.509 cert issuance, reputation, anti-swarm)
#     - vault-broker (multi-cloud secrets management)
#   Phase 3 — Advanced:
#     - policy-manager (OPA/Rego engine, Flask)
#     - network-analyzer (packet capture, NET_ADMIN required)
#     - sequence-modeler (LSTM behavioral patterns)
#     - bundle-cache (OPA bundle caching for flow-enforcer)
#   Phase 4 — FedRAMP:
#     - verifier (TPM attestation, PCR validation)
# ═══════════════════════════════════════════════════════════════════════════════

# ┌─────────────────────────────────────────────────────────────────────────────┐
# │  PHASE 2 — Platform Services                                              │
# └─────────────────────────────────────────────────────────────────────────────┘
---
# ── Vendor Wrapper (OPA-Enforced LLM Proxy) ──────────────────────────────────
# Proxies agent requests to LLM vendors (OpenAI, Anthropic, etc.)
# Enforces OPA policies on which models/vendors each tenant can use.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vendor-wrapper
  namespace: rt19
  labels:
    app: vendor-wrapper
    tier: platform
    component: proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vendor-wrapper
  template:
    metadata:
      labels:
        app: vendor-wrapper
        tier: platform
    spec:
      containers:
        - name: vendor-wrapper
          image: runtimeaicr.azurecr.io/vendor-wrapper:latest
          ports:
            - containerPort: 8103
          env:
            - name: VENDOR_WRAPPER_PORT
              value: "8103"
            - name: TARGET_URL
              value: "https://api.anthropic.com"
            - name: OPA_URL
              value: "http://opa:8181/v1/data/vendor/allow"
            - name: REQUEST_TIMEOUT
              value: "120"
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: rt19-app-secrets
                  key: REDIS_URL
            - name: CONTROL_PLANE_URL
              value: "http://control-plane:8080"
            - name: INTERNAL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: rt19-app-secrets
                  key: INTERNAL_SERVICE_TOKEN
            - name: VAULT_BROKER_URL
              value: "http://vault-broker:8097"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8103
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8103
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  # ⚠️ Named vw-proxy (NOT vendor-wrapper) to avoid K8s env collision:
  # K8s auto-injects VENDOR_WRAPPER_PORT=tcp://... for a service named vendor-wrapper,
  # which conflicts with the Go env var VENDOR_WRAPPER_PORT.
  name: vw-proxy
  namespace: rt19
  labels:
    tier: platform
spec:
  selector:
    app: vendor-wrapper
  ports:
    - port: 8103
      targetPort: 8103
  type: ClusterIP
---
# ── Bot CA (X.509 Certificates, Reputation, Anti-Swarm) ──────────────────────
# Issues/revokes X.509 certificates for agent identity.
# Also handles cert-manager functionality (consolidated).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bot-ca
  namespace: rt19
  labels:
    app: bot-ca
    tier: platform
    component: identity
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bot-ca
  template:
    metadata:
      labels:
        app: bot-ca
        tier: platform
    spec:
      containers:
        - name: bot-ca
          image: runtimeaicr.azurecr.io/bot-ca:latest
          ports:
            - containerPort: 8099
          env:
            - name: PORT
              value: "8099"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: rt19-db-secret
                  key: DATABASE_URL
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8099
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8099
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: bot-ca
  namespace: rt19
  labels:
    tier: platform
spec:
  selector:
    app: bot-ca
  ports:
    - port: 8099
      targetPort: 8099
  type: ClusterIP
---
# ── Vault Broker (Multi-Cloud Secrets) ───────────────────────────────────────
# Unified interface for secrets from Azure Key Vault, AWS Secrets Manager,
# and HashiCorp Vault. Used by flow-enforcer for API key injection.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vault-broker
  namespace: rt19
  labels:
    app: vault-broker
    tier: platform
    component: secrets
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vault-broker
  template:
    metadata:
      labels:
        app: vault-broker
        tier: platform
    spec:
      containers:
        - name: vault-broker
          image: runtimeaicr.azurecr.io/vault-broker:latest
          ports:
            - containerPort: 8097
          env:
            - name: PORT
              value: "8097"
            - name: VAULT_PROVIDER
              value: "azure"
            - name: AZURE_KEY_VAULT_URL
              value: "https://runtimeai-rt19-kv.vault.azure.net"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: rt19-db-secret
                  key: DATABASE_URL
            - name: AZURE_KEY_VAULT_NAME
              value: "runtimeai-rt19-kv"
            - name: API_KEY_SECRET
              valueFrom:
                secretKeyRef:
                  name: rt19-app-secrets
                  key: JWT_SECRET
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8097
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8097
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: vault-broker
  namespace: rt19
  labels:
    tier: platform
spec:
  selector:
    app: vault-broker
  ports:
    - port: 8097
      targetPort: 8097
  type: ClusterIP

