# ── Bundle Cache (OPA Bundle Caching) ────────────────────────────────────────
# Caches OPA policy bundles for flow-enforcer. Also provides kill-switch
# and quota check endpoints used by the WASM filter.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bundle-cache
  namespace: rt19
  labels:
    app: bundle-cache
    tier: platform
    component: policy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bundle-cache
  template:
    metadata:
      labels:
        app: bundle-cache
        tier: platform
    spec:
      containers:
        - name: bundle-cache
          image: runtimeaicr.azurecr.io/bundle-cache:latest
          ports:
            - containerPort: 8094
          env:
            - name: POLICY_MANAGER
              value: "http://policy-manager:8093"
            - name: POLL_SECONDS
              value: "10"
            - name: API_KEY_SECRET
              valueFrom:
                secretKeyRef:
                  name: rt19-app-secrets
                  key: JWT_SECRET
            - name: OPA_URL
              value: "http://opa:8181"
            - name: OPA_RESYNC_SECONDS
              value: "60"
            - name: CONTROL_PLANE_URL
              value: "http://control-plane:8080"
            - name: INTERNAL_SERVICE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: rt19-app-secrets
                  key: INTERNAL_SERVICE_TOKEN
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: rt19-app-secrets
                  key: REDIS_URL
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8094
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8094
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: bundle-cache
  namespace: rt19
  labels:
    tier: platform
spec:
  selector:
    app: bundle-cache
  ports:
    - port: 8094
      targetPort: 8094
  type: ClusterIP

# ┌─────────────────────────────────────────────────────────────────────────────┐
# │  PHASE 4 — FedRAMP Services (deploy when needed for compliance)           │
# └─────────────────────────────────────────────────────────────────────────────┘
---
# ── Verifier (TPM Attestation) ───────────────────────────────────────────────
# Hardware-backed identity: PCR validation, golden measurements, attestation.
# Uses software TPM in cloud (no physical TPM on AKS nodes).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: verifier
  namespace: rt19
  labels:
    app: verifier
    tier: platform
    component: attestation
spec:
  replicas: 1
  selector:
    matchLabels:
      app: verifier
  template:
    metadata:
      labels:
        app: verifier
        tier: platform
    spec:
      containers:
        - name: verifier
          image: runtimeaicr.azurecr.io/verifier:latest
          ports:
            - containerPort: 8108
          env:
            - name: PORT
              value: "8108"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: rt19-db-secret
                  key: DATABASE_URL
            - name: SOFTWARE_TPM
              value: "true"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8108
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8108
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: verifier
  namespace: rt19
  labels:
    tier: platform
spec:
  selector:
    app: verifier
  ports:
    - port: 8108
      targetPort: 8108
  type: ClusterIP
