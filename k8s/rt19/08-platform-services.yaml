            httpGet:
              path: /healthz
              port: 8106
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: network-analyzer
  namespace: rt19
  labels:
    tier: platform
spec:
  selector:
    app: network-analyzer
  ports:
    - port: 8106
      targetPort: 8106
  type: ClusterIP
