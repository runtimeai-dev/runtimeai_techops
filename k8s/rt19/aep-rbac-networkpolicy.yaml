roleRef:
  kind: Role
  name: aep-service-role
  apiGroup: rbac.authorization.k8s.io

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: fraud-shield-role-binding
  namespace: aep
subjects:
- kind: ServiceAccount
  name: fraud-shield-sa
  namespace: aep
roleRef:
  kind: Role
  name: aep-service-role
  apiGroup: rbac.authorization.k8s.io

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: memory-vault-role-binding
  namespace: aep
subjects:
- kind: ServiceAccount
  name: memory-vault-sa
  namespace: aep
roleRef:
