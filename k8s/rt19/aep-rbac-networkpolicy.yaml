---
# AEP RBAC and Network Policies
# Purpose: Enforce least-privilege access and network segmentation

# Service Accounts (one per service)
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kya-sa
  namespace: aep

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cost-control-sa
  namespace: aep

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: audit-black-box-sa
  namespace: aep

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: pii-shield-sa
  namespace: aep

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: observability-sa
  namespace: aep

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: fraud-shield-sa
  namespace: aep

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: memory-vault-sa
  namespace: aep

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: commerce-rails-sa
  namespace: aep

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: commerce-protocol-sa
  namespace: aep

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: marketplace-sa
  namespace: aep

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: developer-hub-sa
  namespace: aep

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: contract-manager-sa
  namespace: aep

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: procurement-hub-sa
  namespace: aep

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: finance-rail-sa
  namespace: aep

---
# Roles: Each service can only read its own secrets and write logs/metrics
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: aep-service-role
  namespace: aep
rules:
# Read own service secret
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get"]
  resourceNames: ["aep-secrets", "aep-postgres-secret"]
# Read ConfigMaps
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list"]
# Write logs (via standard output)
- apiGroups: [""]
  resources: ["pods/log"]
  verbs: ["get", "create"]

---
# RoleBindings: Bind all service accounts to the role
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: kya-role-binding
  namespace: aep
subjects:
- kind: ServiceAccount
  name: kya-sa
  namespace: aep
roleRef:
  kind: Role
  name: aep-service-role
  apiGroup: rbac.authorization.k8s.io

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cost-control-role-binding
  namespace: aep
subjects:
- kind: ServiceAccount
  name: cost-control-sa
  namespace: aep
roleRef:
  kind: Role
  name: aep-service-role
  apiGroup: rbac.authorization.k8s.io

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: audit-black-box-role-binding
  namespace: aep
subjects:
- kind: ServiceAccount
  name: audit-black-box-sa
  namespace: aep
roleRef:
  kind: Role
  name: aep-service-role
  apiGroup: rbac.authorization.k8s.io

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: pii-shield-role-binding
  namespace: aep
subjects:
- kind: ServiceAccount
  name: pii-shield-sa
  namespace: aep
roleRef:
  kind: Role
  name: aep-service-role
  apiGroup: rbac.authorization.k8s.io

---
apiVersion: rbac.authorization.k8s.io/v1
