metadata:
  name: developer-hub-role-binding
  namespace: aep
subjects:
- kind: ServiceAccount
  name: developer-hub-sa
  namespace: aep
roleRef:
  kind: Role
  name: aep-service-role
  apiGroup: rbac.authorization.k8s.io

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: contract-manager-role-binding
  namespace: aep
subjects:
- kind: ServiceAccount
