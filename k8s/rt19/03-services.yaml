# AI FinOps Service (public — finops.rt19.runtimeai.io)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-finops-service
  namespace: rt19
  labels:
    app: ai-finops-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-finops-service
  template:
    metadata:
      labels:
        app: ai-finops-service
    spec:
      containers:
        - name: ai-finops-service
          image: runtimeaicr.azurecr.io/ai-finops-service:latest
          ports:
            - containerPort: 8092
          envFrom:
            # OPER_RT19-104 §J — pubkey + LICENSE_SERVICE_URL.
            - configMapRef:
                name: runtimeai-license-pubkey
                optional: true
          env:
            # OPER_RT19-104 §B3 — license enforcement DISABLED until rollout.
            # Flip with: kubectl set env deploy/ai-finops-service -n rt19 ENFORCE_LICENSE=true
            - name: ENFORCE_LICENSE
              value: "false"
            - name: RUNTIMEAI_LICENSE_KEY
              valueFrom:
                secretKeyRef:
                  name: runtimeai-license
                  key: license.jwt
                  optional: true
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: rt19-db-secret
                  key: DATABASE_URL
          volumeMounts:
            - name: license-file
              mountPath: /etc/runtimeai
              readOnly: true
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8092
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8092
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
      volumes:
        - name: license-file
          secret:
            secretName: runtimeai-license
            optional: true
            items:
              - key: license.jwt
                path: license.jwt
---
apiVersion: v1
kind: Service
metadata:
  name: ai-finops-service
  namespace: rt19
spec:
  selector:
    app: ai-finops-service
  ports:
    - port: 8092
      targetPort: 8092
  type: ClusterIP
---
# Billing Service (internal — billing API)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: billing-service
  namespace: rt19
  labels:
    app: billing-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: billing-service
  template:
    metadata:
      labels:
        app: billing-service
    spec:
      containers:
        - name: billing-service
          image: runtimeaicr.azurecr.io/billing-service:latest
          ports:
            - containerPort: 5090
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: rt19-db-secret
                  key: DATABASE_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: rt19-app-secrets
                  key: JWT_SECRET
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: rt19-app-secrets
                  key: REDIS_URL  # REQ-043: Redis with AUTH
            - name: SERVICE_PORT
              value: "5090"
            - name: STRIPE_MODE
              value: "test"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 5090
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 5090
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: billing-service
  namespace: rt19
spec:
  selector:
    app: billing-service
  ports:
    - port: 5090
      targetPort: 5090
  type: ClusterIP
