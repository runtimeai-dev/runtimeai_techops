      labels:
        app: discovery
    spec:
      containers:
        - name: discovery
          image: runtimeaicr.azurecr.io/discovery:latest
          ports:
            - containerPort: 8090
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: rt19-db-secret
                  key: DATABASE_URL
            - name: PORT
              value: "8090"
            - name: CONTROL_PLANE_URL
              value: "http://control-plane:8080"
            - name: VAULT_ADDR
              value: "http://vault-broker:8097"
            - name: RUNTIMEAI_SERVICE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: rt19-app-secrets
                  key: JWT_SECRET
            - name: API_KEY_SECRET
              valueFrom:
                secretKeyRef:
                  name: rt19-app-secrets
                  key: API_KEY_SECRET
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: rt19-app-secrets
                  key: REDIS_URL
            - name: RUN_MODE
              value: "production"
            - name: POLICY_MANAGER_URL
              value: "http://policy-manager:8093"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8090
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8090
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: discovery
  namespace: rt19
spec:
  selector:
    app: discovery
  ports:
    - port: 8090
      targetPort: 8090
  type: ClusterIP
---
# eSign Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: esign-service
  namespace: rt19
  labels:
    app: esign-service
spec:
  replicas: 1  # ReadWriteOnce PVC prevents >1 replica; use Recreate strategy
  strategy:
    type: Recreate  # Required: esign-storage PVC is ReadWriteOnce, cannot Multi-Attach
  selector:
    matchLabels:
      app: esign-service
  template:
    metadata:
      labels:
        app: esign-service
    spec:
      containers:
        - name: esign-service
          image: runtimeaicr.azurecr.io/esign-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8096
          envFrom:
            # OPER_RT19-104 §J — pubkey + LICENSE_SERVICE_URL.
            - configMapRef:
                name: runtimeai-license-pubkey
                optional: true
          env:
            # OPER_RT19-104 §B2 — license enforcement is DISABLED until the
            # runtimeai-license Secret is populated for this tenant. Flip with
            # kubectl set env deploy/esign-service -n rt19 ENFORCE_LICENSE=true
            - name: ENFORCE_LICENSE
              value: "false"
            - name: RUNTIMEAI_LICENSE_KEY
              valueFrom:
                secretKeyRef:
                  name: runtimeai-license
                  key: license.jwt
                  optional: true
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: rt19-db-secret
                  key: DATABASE_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: rt19-app-secrets
                  key: JWT_SECRET
            - name: EMAIL_PROVIDER
              value: "sendgrid"
            - name: SENDGRID_API_KEY
              valueFrom:
                secretKeyRef:
                  name: rt19-email-secrets
                  key: SENDGRID_API_KEY
            - name: SENDGRID_FROM_EMAIL
              valueFrom:
                secretKeyRef:
                  name: rt19-email-secrets
                  key: SENDGRID_FROM_EMAIL
            - name: ESIGN_BASE_URL
              value: "https://esign.rt19.runtimeai.io"
            - name: STORAGE_SIGNING_SECRET
              valueFrom:
                secretKeyRef:
                  name: rt19-email-secrets
                  key: STORAGE_SIGNING_SECRET
            - name: PORT
              value: "8096"
            - name: AUTH_SERVICE_URL
              value: "http://auth-svc:8097"
            # CORS origins (production)
            - name: CORS_ALLOWED_ORIGINS
              value: "https://esign.rt19.runtimeai.io,https://www.runtimeai.io"
            # Azure Blob Storage (REQ-019, ESIGN-100: production storage)
            - name: STORAGE_BACKEND
              value: "azure"
            - name: AZURE_STORAGE_ACCOUNT
              valueFrom:
                secretKeyRef:
                  name: rt19-storage-secrets
                  key: AZURE_STORAGE_ACCOUNT
            - name: AZURE_STORAGE_KEY
              valueFrom:
                secretKeyRef:
                  name: rt19-storage-secrets
                  key: AZURE_STORAGE_KEY
            - name: AZURE_STORAGE_CONTAINER
              value: "esign-documents"
            - name: STORAGE_PATH
              value: "/tmp/esign"  # temp dir for processing, not primary storage
            # REQ-061: Redis cache (gracefully degrades if unavailable)
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: rt19-app-secrets
                  key: REDIS_URL
            # REQ-085: Billing service for Stripe checkout proxy
            - name: BILLING_SERVICE_URL
              value: "http://billing-service:5090"
            # Log level
            - name: LOG_LEVEL
              value: "info"
            # ── PQDP / QUANTUM mode (OPER_RT19-060) ───────────────────────
            # rt19 stays LEGACY (classical). Set ESIGN_CRYPTO_MODE=QUANTUM on rt01+.
            # These vars are no-ops in LEGACY mode but scaffold is ready for migration.
            - name: ESIGN_CRYPTO_MODE
              value: "LEGACY"
            - name: POD_ID
              value: "rt19"
            - name: ACTIVE_PODS
              value: "rt19"
            - name: PQDP_TENANT_ID
              value: "esign-platform"
            - name: QUANTUMVAULT_URL
              value: "https://quantumvault.pqdata.svc.cluster.local:8200"
            - name: PQ_SIGN_URL
              value: "https://pq-sign.pqdata.svc.cluster.local:8443"
            - name: PQ_POLICY_URL
              value: "http://pq-policy-engine.pqdata.svc.cluster.local:8083"
            - name: QUANTUMVAULT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: rt19-pqdp-secrets
                  key: QUANTUMVAULT_TOKEN
                  optional: true   # not required in LEGACY mode
            - name: PQDP_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: rt19-pqdp-secrets
                  key: PQDP_JWT_SECRET
                  optional: true   # not required in LEGACY mode
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8096
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8096
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 30m
              memory: 96Mi
            limits:
              cpu: 500m
              memory: 1Gi
          volumeMounts:
            - name: license-file
              mountPath: /etc/runtimeai
              readOnly: true
      volumes:
        - name: license-file
          secret:
            secretName: runtimeai-license
            optional: true
            items:
              - key: license.jwt
                path: license.jwt
---
apiVersion: v1
kind: Service
metadata:
  name: esign-service
  namespace: rt19
spec:
  selector:
    app: esign-service
  ports:
    - port: 8096
      targetPort: 8096
  type: ClusterIP
