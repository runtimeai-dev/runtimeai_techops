# Network Policies — TOPS-028
# Zero-trust ingress/egress rules; default deny all, allow specific paths

---
# Default deny all ingress in rt19 namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: rt19
spec:
  podSelector: {}
  policyTypes:
    - Ingress

---
# Allow ingress from Nginx Ingress Controller → API services
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-from-ingress
  namespace: rt19
spec:
  podSelector:
    matchLabels:
      tier: api
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: nginx-ingress
      ports:
        - protocol: TCP
          port: 8080

---
# Allow control-plane to PostgreSQL
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-cp-to-postgres
  namespace: rt19
spec:
  podSelector:
    matchLabels:
      app: postgres
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: control-plane
      ports:
        - protocol: TCP
          port: 5432

---
# Allow all services to Redis (cache)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-to-redis
  namespace: rt19
spec:
  podSelector:
    matchLabels:
      app: redis
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector: {}  # Any pod in namespace
      ports:
        - protocol: TCP
          port: 6379

---
# Allow cost-ledger, drift-engine, waf to QuantumVault
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-to-quantumvault
  namespace: rt19
spec:
  podSelector:
    matchLabels:
      app: quantumvault
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              requires-qv: "true"
      ports:
        - protocol: TCP
          port: 8200

---
# Deny all egress by default
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-egress
  namespace: rt19
spec:
  podSelector: {}
  policyTypes:
    - Egress

---
# Allow egress from any pod to Kubernetes DNS
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns
  namespace: rt19
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53

---
# Allow control-plane egress to PostgreSQL
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: cp-egress-to-postgres
  namespace: rt19
spec:
  podSelector:
    matchLabels:
      app: control-plane
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: postgres
      ports:
        - protocol: TCP
          port: 5432
    # Allow DNS
    - to:
        - podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53

---
# Allow services egress to external APIs (mcp-gateway, cost-ledger, etc.)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-external-apis
  namespace: rt19
spec:
  podSelector:
    matchLabels:
      external-api-access: "true"
  policyTypes:
    - Egress
  egress:
    # Allow to external CIDR (e.g., Azure NAT gateway)
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except:
              - 169.254.169.254/32  # Block metadata service
      ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 80
    # Allow DNS
    - to:
        - podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53

---
# Egress from services to Prometheus (metrics scraping)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-to-prometheus
  namespace: rt19
spec:
  podSelector:
    matchLabels:
      app: prometheus
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector: {}  # Any pod can be scraped
      ports:
        - protocol: TCP
          port: 9090

---
# Allow ingress to Jaeger collector (tracing)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-to-jaeger
  namespace: rt19
spec:
  podSelector:
    matchLabels:
      app: jaeger
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector: {}  # Any pod can send traces
      ports:
        - protocol: TCP
          port: 6831
        - protocol: UDP
          port: 6831

---
# Egress from WAF to upstream services (hairpin)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: waf-egress-hairpin
  namespace: rt19
spec:
  podSelector:
    matchLabels:
      app: waf
  policyTypes:
    - Egress
  egress:
    # Allow to control-plane and other services (hairpin)
    - to:
        - podSelector:
            matchLabels:
              tier: api
      ports:
        - protocol: TCP
          port: 8080
    # Allow DNS
    - to:
        - podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
    # Allow to PostgreSQL
    - to:
        - podSelector:
            matchLabels:
              app: postgres
      ports:
        - protocol: TCP
          port: 5432
