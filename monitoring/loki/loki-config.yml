# Log Aggregation (Loki) — TOPS-038
# Centralized log collection with 30-day retention

auth_enabled: false

ingester:
  chunk_idle_period: 3m
  chunk_retain_period: 1m
  max_chunk_age: 1h
  chunk_size_limit_bytes: 1024000
  max_streams_per_user: 10000
  chunk_encoding: snappy

limits_config:
  ingestion_rate_mb: 50
  ingestion_burst_size_mb: 100
  max_line_size: 262144
  rate_limit_enabled: true
  rate_limit_burst: 500000

schema_config:
  configs:
    - from: 2024-01-01
      store: boltdb-shipper
      object_store: filesystem
      schema: v11
      index:
        prefix: index_
        period: 24h

server:
  http_listen_port: 3100
  log_level: info

storage_config:
  boltdb_shipper:
    active_index_directory: /loki/boltdb-shipper-active
    shared_store: filesystem
  filesystem:
    directory: /loki/chunks

chunk_store_config:
  max_look_back_period: 0s

table_manager:
  retention_deletes_enabled: true
  retention_period: 720h  # 30 days
  poll_interval: 10m

query_range:
  align_queries_with_step: true
  max_cache_freshness_per_query: 10m
  cache_results: true
  results_cache:
    cache:
      enable_fifocache: true
      default_validity: 1m
      memcached_client:
        addresses: localhost:11211

loki:
  querier:
    engine: prometheus
    max_cache_freshness_per_query: 5m

# Prometheus compatible promtail scrape configs
scrape_configs:
  - job_name: kubernetes-pods
    kubernetes_sd_configs:
      - role: pod
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_label_app]
        action: replace
        target_label: app
      - source_labels: [__meta_kubernetes_pod_label_version]
        action: replace
        target_label: version
      - source_labels: [__meta_kubernetes_namespace]
        action: replace
        target_label: namespace
      - source_labels: [__meta_kubernetes_pod_name]
        action: replace
        target_label: pod

  - job_name: kubernetes-nodes
    kubernetes_sd_configs:
      - role: node
    relabel_configs:
      - action: labelmap
        regex: __meta_kubernetes_node_label_(.+)
      - target_label: __address__
        replacement: kubernetes.default.svc:443
      - source_labels: [__meta_kubernetes_node_name]
        regex: (.+)
        target_label: __metrics_path__
        replacement: /api/v1/nodes/${1}/proxy/metrics

  - job_name: control-plane
    static_configs:
      - targets:
          - localhost
        labels:
          job: control-plane
          __path__: /var/log/control-plane/*.log
    pipeline_stages:
      - json:
          expressions:
            timestamp: timestamp
            level: level
            message: msg
            error: error
      - labels:
          level:
          timestamp:

  - job_name: cost-ledger
    static_configs:
      - targets:
          - localhost
        labels:
          job: cost-ledger
          __path__: /var/log/cost-ledger/*.log

# Retention rules (keep error logs longer)
retention_rules:
  - selector: '{level="error"}'
    period: 1440h  # 60 days for errors
  - selector: '{level="warn"}'
    period: 720h   # 30 days for warnings
  - selector: '{level="info"}'
    period: 168h   # 7 days for info
  - selector: '{level="debug"}'
    period: 24h    # 1 day for debug
