# SLO Review Process

## Weekly SLO Review (Monday 09:00 UTC)
1. Check all SLIs are tracking to target
2. Review any SLI violations
3. Assess error budget health
4. Plan remediation if over budget

## Monthly SLO Report (Last Friday of month)
1. Final SLO compliance numbers
2. Root cause analysis of any violations
3. Recommendations for next month
4. Share with stakeholders

## Quarterly SLO Adjustment (Every 3 months)
1. Review actual performance vs. SLO targets
2. Adjust SLOs if unrealistic or too loose
3. Update error budget calculations
4. Communicate changes to team
