# SLO Alerting

## Critical SLO Alerts

### Alert: SLO Burn Rate High
```
expr: (rate(http_requests_total{status=~"5.."}[5m]) / rate(http_requests_total[5m])) > 1
for: 5m
severity: critical
action: Page on-call immediately
```

### Alert: Error Budget Depleted
```
expr: remaining_error_budget_seconds < 0
for: 1m
severity: critical
action: Freeze non-critical deployments
```

### Alert: Latency SLI Violated
```
expr: histogram_quantile(0.99, http_request_duration_seconds_bucket) > 0.5
for: 10m
severity: high
action: Investigate and optimize
```

