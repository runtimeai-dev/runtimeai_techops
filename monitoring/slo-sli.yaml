# Service Level Indicators (SLIs)

## Availability SLI (request success)
```
SLI = (200-499 responses) / (total responses)
Target: > 99.9%
Measurement: Prometheus `rate(http_requests_total{status=~"2.."}[5m])`
```

## Latency SLI (response time)
```
SLI = (responses with latency < threshold) / (total responses)
Target: > 99% of requests below threshold
Thresholds:
  - API: < 500ms
  - Dashboard: < 200ms
  - Batch: < 1s
Measurement: Prometheus `histogram_quantile(0.99, http_request_duration_seconds_bucket)`
```

## Error Rate SLI
```
SLI = (5xx errors) / (total requests)
Target: < 0.1% error rate
Measurement: Prometheus `rate(http_requests_total{status=~"5.."}[5m])`
```

## Database Replication SLI
```
SLI = (replication_lag_seconds < 1) / (total checks)
Target: > 99.9%
Measurement: Custom exporter `pg_replication_lag_seconds`
```

## Cache Hit Rate SLI
```
SLI = (redis_hits) / (redis_hits + redis_misses)
Target: > 95%
Measurement: Prometheus `redis_hit_rate`
```

