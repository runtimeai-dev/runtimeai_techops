# SLO/SLI Definitions — TOPS-041
# Service Level Objectives & Indicators for 99.9% uptime SLA

---
# Service Level Objectives (SLOs)

## Platform SLO: 99.9% Uptime
- Target: 3 9's (99.9% availability)
- Monthly Error Budget: 43.2 minutes
- Measurement: Uptime per calendar month (all services combined)

### Service-Specific SLOs

**Control Plane**: 99.95% (21.6 min error budget)
- Availability: control-plane /health returning 200
- Latency: p99 < 500ms
- Error Rate: < 0.1%

**Dashboard**: 99.9% (43.2 min error budget)
- Availability: dashboard frontend loading in < 3s
- API latency: p99 < 200ms for UI requests
- Error rate: < 0.1%

**MCP Gateway**: 99.95% (21.6 min error budget)
- Availability: gateway /health returning 200
- Latency: p99 < 100ms for vendor routing
- Error rate: < 0.1%

**Cost Ledger**: 99.5% (216 min error budget)
- Availability: cost-ledger /health
- Latency: p99 < 1000ms for batch operations
- Error rate: < 0.5%

**Database (PostgreSQL)**: 99.99% (4.3 min error budget)
- Replication lag: < 1s
- Connection availability: 95%+ connections available
- Query latency: p99 < 100ms for standard queries

**Cache (Redis)**: 99.95% (21.6 min error budget)
- Hit rate: > 95%
- Latency: < 10ms for get/set
- Availability: > 99.95%

