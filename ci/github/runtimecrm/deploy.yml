name: Deploy
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v1
        with: { creds: '${{ secrets.AZURE_CREDENTIALS }}' }
      - run: az acr login --name runtimeaicr
      - run: cd services/arh && go test -race ./...
      - run: bash deployment/scripts/build-push-deploy.sh arh
      - run: bash deployment/scripts/build-push-deploy.sh console
      - name: Verify deployment
        run: |
          sleep 30
          curl -f https://api.runtimecrm.com/healthz || exit 1
