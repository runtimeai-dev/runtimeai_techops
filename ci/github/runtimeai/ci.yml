name: CI — RuntimeAI Services

on:
  # ── Manual trigger only (cost containment) ──────────────────────────
  workflow_dispatch:
    inputs:
      run_integration:
        description: 'Trigger cross-repo integration tests on enterprise repo'
        required: false
        default: false
        type: boolean
  # ── Original auto-triggers (disabled to save CI costs) ──────────────
  # push:
  #   branches: [main, dev]
  #   paths:
  #     - 'auth-service/**'
  #     - 'SaaSAdminApp/**'
  #     - 'landing-frontend/**'
  #     - 'landing-backend/**'
  #     - 'mcp_gateway/**'
  #     - 'ai_finops/**'
  #     - 'auto_ai_compliance/**'
  #     - 'agent_marketplace/**'
  #     - '.github/workflows/**'
  # pull_request:
  #   branches: [main, dev]

# Cancel in-progress runs for same branch/PR
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-go-services:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - {name: auth-service, path: auth-service}
          - {name: mcp-gateway, path: mcp_gateway/mcp-gateway}
          - {name: ai-finops-service, path: ai_finops/ai-finops-service}
          - {name: aaic-service, path: auto_ai_compliance/aaic-service}
          - {name: marketplace-service, path: agent_marketplace/marketplace-service}
          - {name: landing-backend, path: landing-backend}
          - {name: billing-service, path: billing-service}
          - {name: esign-service, path: esign-service/esign-service}
          - {name: mcp-server-okta, path: mcp_gateway/mcp-servers/mcp-server-okta}
          - {name: mcp-server-postgresql, path: mcp_gateway/mcp-servers/mcp-server-postgresql}
          - {name: ml-intelligence-service, path: ml-service/ml-intelligence-service}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: Build ${{ matrix.service.name }}
        run: |
          cd ${{ matrix.service.path }}
          go build -v ./...
      - name: Test ${{ matrix.service.name }}
        run: |
          cd ${{ matrix.service.path }}
          go test -v ./... || true

  build-frontend:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - {name: saas-admin, path: SaaSAdminApp}
          # landing-frontend is DEPRECATED — use runtimeai-landing instead
          # - {name: landing-frontend, path: landing-frontend}
          - {name: runtimeai-landing, path: runtimeai-landing}
          - {name: esign-landing, path: esign-landing}
          - {name: auditor-dashboard, path: auto_ai_compliance/auditor-dashboard}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Build ${{ matrix.service.name }}
        run: |
          cd ${{ matrix.service.path }}
          npm ci
          npm run build

  docker-build:
    runs-on: ubuntu-latest
    needs: [build-go-services, build-frontend]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service:
          - {name: auth-service, context: auth-service}
          - {name: saas-admin, context: SaaSAdminApp}
          # landing-frontend is DEPRECATED — use runtimeai-landing instead
          # - {name: landing-frontend, context: landing-frontend}
          - {name: runtimeai-landing, context: runtimeai-landing}
          - {name: mcp-gateway, context: mcp_gateway/mcp-gateway}
          - {name: ai-finops-service, context: ai_finops/ai-finops-service}
          - {name: aaic-service, context: auto_ai_compliance/aaic-service}
          - {name: marketplace-service, context: agent_marketplace/marketplace-service}
          - {name: billing-service, context: billing-service}
          - {name: esign-service, context: esign-service/esign-service}
          - {name: esign-landing, context: esign-landing}
          - {name: auditor-dashboard, context: auto_ai_compliance/auditor-dashboard}
          - {name: mcp-server-okta, context: mcp_gateway/mcp-servers/mcp-server-okta}
          - {name: landing-backend, context: landing-backend}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service.context }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/runtimeai-${{ matrix.service.name }}:latest
            ghcr.io/${{ github.repository_owner }}/runtimeai-${{ matrix.service.name }}:${{ github.sha }}

  # ── Trigger Cross-Repo Integration Tests ─────────────────────────────
  # Instead of running integration tests here (which would duplicate),
  # dispatch to runtimeai-enterprise — the canonical location for full-stack tests.
  # Uses a concurrency group there to prevent duplicate runs when both repos promote.
  trigger-integration-tests:
    runs-on: ubuntu-latest
    needs: [build-go-services, build-frontend]
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'pull_request' && github.base_ref == 'main')
    steps:
      - name: Dispatch integration tests to runtimeai-enterprise
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.CROSS_REPO_TOKEN }}
          repository: ${{ github.repository_owner }}/runtimeai-enterprise
          event-type: run-integration-tests
          client-payload: '{"triggered_by": "runtimeai", "ref": "${{ github.sha }}"}'
