name: CI
# NOTE (R3-CC-004): Auto-triggers are intentionally limited to dev/main branches.
# On free-tier GitHub Actions runners, matrix jobs across 10 services can exhaust
# the free minutes allowance quickly. To run CI manually: gh workflow run ci.yml
# or push to dev/main. Feature branch CI is skipped to conserve minutes.

# Triggers disabled — free tier only. Re-enable by uncommenting the on: block below.
on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]
  workflow_dispatch: # manual trigger only

jobs:
  build-and-test:
    name: Build & Test (${{ matrix.service }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service:
          - quantumvault
          - pq-secure-datashare
          - pq-policy-engine
          - pq-cryptoguard
          - pq-transit-shield
          - pq-tokenvault
          - pq-sign
          - pq-developer-platform
          - pq-migrate
          - pq-comply

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: services/${{ matrix.service }}/go.sum

      - name: Build ${{ matrix.service }}
        working-directory: services/${{ matrix.service }}
        run: go build ./...

      - name: Test ${{ matrix.service }}
        working-directory: services/${{ matrix.service }}
        run: go test -v -race -timeout 60s ./...

  go-workspace:
    name: Go Workspace Sync Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Verify go.work
        run: go work sync

      - name: Build all modules
        run: go build ./...

  docker-build:
    name: Docker Build (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: quantumvault
            context: services/quantumvault
          - service: pq-secure-datashare
            context: services/pq-secure-datashare
          - service: pq-policy-engine
            context: services/pq-policy-engine
          - service: pq-cryptoguard
            context: services/pq-cryptoguard
          - service: pq-tokenvault
            context: services/pq-tokenvault
          - service: pq-sign
            context: services/pq-sign
          - service: pq-comply
            context: services/pq-comply
          - service: pq-developer-platform
            context: services/pq-developer-platform
          - service: pq-migrate
            context: services/pq-migrate
          # Frontend apps (nginx + React build)
          - service: qutonomous-dashboard
            context: apps/qutonomous-dashboard
          - service: qutonomous-auditor
            context: apps/qutonomous-auditor
          - service: qutonomous-admin
            context: apps/qutonomous-admin
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image for ${{ matrix.service }}
        working-directory: ${{ matrix.context }}
        run: |
          docker build \
            -t qutonomous/${{ matrix.service }}:ci \
            .

  docker-push:
    name: Push to ACR (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: [docker-build]
    # Only push on dev or main; requires ACR credentials in repo secrets
    if: github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/main'
    strategy:
      matrix:
        include:
          - service: quantumvault
            context: services/quantumvault
          - service: pq-secure-datashare
            context: services/pq-secure-datashare
          - service: pq-policy-engine
            context: services/pq-policy-engine
          - service: pq-cryptoguard
            context: services/pq-cryptoguard
          - service: pq-tokenvault
            context: services/pq-tokenvault
          - service: pq-sign
            context: services/pq-sign
          - service: pq-comply
            context: services/pq-comply
          - service: pq-developer-platform
            context: services/pq-developer-platform
          - service: pq-migrate
            context: services/pq-migrate
          - service: qutonomous-dashboard
            context: apps/qutonomous-dashboard
          - service: qutonomous-auditor
            context: apps/qutonomous-auditor
          - service: qutonomous-admin
            context: apps/qutonomous-admin
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: runtimeaicr.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Set image tag
        id: tag
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "tag=latest" >> $GITHUB_OUTPUT
          else
            echo "tag=dev-$(echo ${{ github.sha }} | head -c 7)" >> $GITHUB_OUTPUT
          fi

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            runtimeaicr.azurecr.io/qutonomous/${{ matrix.service }}:${{ steps.tag.outputs.tag }}
            runtimeaicr.azurecr.io/qutonomous/${{ matrix.service }}:${{ github.sha }}

  frontend-check:
    name: Frontend TypeScript & Build (${{ matrix.app }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app:
          - qutonomous-landing
          - qutonomous-dashboard
          - qutonomous-developers
          - qutonomous-trust
          - qutonomous-auditor
          - qutonomous-admin
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/${{ matrix.app }}/package-lock.json

      - name: Install dependencies
        working-directory: apps/${{ matrix.app }}
        run: npm ci --legacy-peer-deps

      - name: TypeScript type-check
        working-directory: apps/${{ matrix.app }}
        run: npx tsc -b --noEmit

      - name: Build
        working-directory: apps/${{ matrix.app }}
        run: npm run build
        env:
          # Provide stub values so Vite env substitution doesn't fail
          VITE_API_URL: ""
          VITE_ENV: "ci"
          VITE_SENTRY_DSN: ""

  brand-lint:
    name: Brand Lint — no legacy RuntimeAI refs in Qutonomous apps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for banned brand strings in apps/
        run: |
          # Disallowed: old brand names that should never appear in the Qutonomous frontend.
          # "RuntimeAI" is the parent company infra brand — keep out of product copy.
          # "PQ Data", "PQData", "pqdata" are the old product brand names.
          BANNED="RuntimeAI|PQ Data|PQData|pqdata"
          MATCHES=$(grep -rn --include="*.ts" --include="*.tsx" --include="*.js" --include="*.jsx" \
            --include="*.html" --include="*.json" \
            -E "$BANNED" apps/ \
            --exclude-dir=node_modules --exclude-dir=dist \
            || true)
          if [ -n "$MATCHES" ]; then
            echo "❌ Banned brand strings found in apps/:"
            echo "$MATCHES"
            exit 1
          fi
          echo "✅ No banned brand strings found."

  lint:
    name: Go Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: .
          args: --timeout=5m
        continue-on-error: true
