# CI — PR Quality Gate (GAP-06)
# Fast build+lint checks on every PR to dev.
# Integration tests are in ci-backend.yml (manual trigger).
name: CI — PR Quality Gate

on:
  # ── Manual trigger only (enable auto-triggers when ready) ───────────
  workflow_dispatch:
    inputs:
      skip_sdk:
        description: 'Skip SDK checks (faster)'
        required: false
        default: false
        type: boolean
  # ── Auto-triggers (uncomment when CI budget approved) ───────────────
  # pull_request:
  #   branches: [dev, main]
  # push:
  #   branches: [dev]

# Cancel in-progress runs for same PR
concurrency:
  group: ci-pr-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  # ── Go Build & Vet ─────────────────────────────────────────────────
  go-build:
    name: Go Build — ${{ matrix.service.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        service:
          - {name: control-plane, path: control-plane}
          - {name: cli, path: cli}
          - {name: drift-engine, path: services/drift-engine}
          - {name: cost-ledger, path: services/cost-ledger}
          - {name: data-proxy, path: services/data-proxy}
          - {name: identity-dns, path: services/identity-dns}
          - {name: vendor-wrapper, path: services/vendor-wrapper}
          - {name: sidecar-injector, path: services/sidecar-injector}
          - {name: esign-service, path: esign-service/esign-service}
          - {name: marketplace, path: services/marketplace}
          - {name: ai-finops, path: services/ai-finops}
          - {name: billing-service, path: services/billing-service}
          - {name: mcp-gateway, path: mcp_gateway}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: ${{ matrix.service.path }}/go.sum
      - name: Build
        run: cd ${{ matrix.service.path }} && go build -v ./...
      - name: Vet
        run: cd ${{ matrix.service.path }} && go vet ./...

  # ── Dashboard Build ────────────────────────────────────────────────
  dashboard-build:
    name: Dashboard Build
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: dashboard/package-lock.json
      - run: cd dashboard && npm ci
      - name: TypeScript Check
        run: cd dashboard && npx tsc --noEmit
      - name: Production Build
        run: cd dashboard && npm run build

  # ── TypeScript SDK ─────────────────────────────────────────────────
  sdk-typescript:
    name: TypeScript SDK Build
    if: ${{ !inputs.skip_sdk }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: sdk/typescript/package-lock.json
      - run: cd sdk/typescript && npm ci
      - name: Build SDK
        run: cd sdk/typescript && npm run build

  # ── Python SDK ─────────────────────────────────────────────────────
  sdk-python:
    name: Python SDK Check
    if: ${{ !inputs.skip_sdk }}
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Verify importable
        run: |
          cd sdk-python
          pip install -e . 2>/dev/null || pip install . 2>/dev/null || true
          python -c "from runtimeai import RuntimeAI; print('✅ SDK importable')"

  # ── Quality Gate ───────────────────────────────────────────────────
  # Single check that all jobs passed — used as branch protection rule target
  ci-passed:
    name: CI Passed
    if: always()
    needs: [go-build, dashboard-build, sdk-typescript, sdk-python]
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          echo "Go Build:        ${{ needs.go-build.result }}"
          echo "Dashboard Build: ${{ needs.dashboard-build.result }}"
          echo "TS SDK:          ${{ needs.sdk-typescript.result }}"
          echo "Python SDK:      ${{ needs.sdk-python.result }}"

          if [[ "${{ needs.go-build.result }}" == "failure" ]] || \
             [[ "${{ needs.dashboard-build.result }}" == "failure" ]]; then
            echo "❌ CI failed — build errors must be fixed before merge"
            exit 1
          fi

          echo "✅ All CI checks passed"
