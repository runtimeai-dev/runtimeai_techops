name: CI — RuntimeAI Enterprise Services

on:
  # ── Manual trigger only (cost containment) ──────────────────────────
  workflow_dispatch:
    inputs:
      run_integration:
        description: 'Run integration tests (requires CROSS_REPO_TOKEN)'
        required: false
        default: false
        type: boolean
  # ── Original auto-triggers (disabled to save CI costs) ──────────────
  # push:
  #   branches: [main, dev]
  #   paths:
  #     - 'control-plane/**'
  #     - 'services/**'
  #     - 'flow-enforcer/**'
  #     - 'dashboard/**'
  #     - 'discovery/**'
  #     - 'policy-manager/**'
  #     - 'cli/**'
  #     - 'verification/**'
  #     - '.github/workflows/**'
  # pull_request:
  #   branches: [main, dev]
  # Triggered by RuntimeAI repo dispatch (also disabled)
  # repository_dispatch:
  #   types: [run-integration-tests]

# Cancel in-progress runs for same branch/PR
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-go-services:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - {name: control-plane, path: control-plane}
          - {name: drift-engine, path: services/drift-engine}
          - {name: cost-ledger, path: services/cost-ledger}
          - {name: data-proxy, path: services/data-proxy}
          - {name: identity-dns, path: services/identity-dns}
          - {name: vendor-wrapper, path: services/vendor-wrapper}
          - {name: bot-ca, path: services/bot-ca}
          - {name: verifier, path: services/verifier}
          - {name: network-analyzer, path: services/network-analyzer}
          - {name: sequence-modeler, path: services/sequence-modeler}
          - {name: flow-enforcer-wasm, path: flow-enforcer/wasm}
          - {name: verification, path: verification}
          - {name: cli-installer, path: cli/installer}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: Install system dependencies
        if: matrix.service.name == 'network-analyzer'
        run: sudo apt-get update && sudo apt-get install -y libpcap-dev
      - name: Build ${{ matrix.service.name }}
        run: |
          cd ${{ matrix.service.path }}
          go build -v ./...
      - name: Test ${{ matrix.service.name }}
        run: |
          cd ${{ matrix.service.path }}
          go test -v ./... || true

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: dashboard/package-lock.json
      - name: Install Dependencies
        run: |
          cd dashboard
          npm ci
      - name: Build Dashboard
        run: |
          cd dashboard
          npm run build
      - name: Lint Dashboard
        run: |
          cd dashboard
          npm run lint

  # ── Integration Tests ──────────────────────────────────────────────
  # Canonical location for cross-repo integration tests (runs only here).
  # Triggered by: (1) this repo's promote-to-main, or (2) RuntimeAI dispatch.
  # Uses a dedicated concurrency group to prevent duplicate runs.
  integration-test:
    runs-on: ubuntu-latest
    needs: [build-go-services, build-frontend]
    if: >-
      github.event_name == 'repository_dispatch' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'pull_request' && github.base_ref == 'main')
    timeout-minutes: 30
    concurrency:
      group: integration-tests
      cancel-in-progress: true

    steps:
      - name: Checkout runtimeai-enterprise
        uses: actions/checkout@v4
        with:
          path: runtimeai-enterprise

      - name: Checkout RuntimeAI
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/runtimeai
          ref: main
          path: RuntimeAI
          token: ${{ secrets.CROSS_REPO_TOKEN }}

      - name: Set up environment
        run: |
          echo "ENTERPRISE_DIR=${{ github.workspace }}/runtimeai-enterprise" >> $GITHUB_ENV
          echo "RUNTIMEAI_DIR=${{ github.workspace }}/RuntimeAI" >> $GITHUB_ENV

          cat <<'EOF' > ${{ github.workspace }}/runtimeai-enterprise/deployment/docker-compose/.env
          REDIS_URL=redis://:rtai-redis-secret-2026@redis:6379/0
          DATABASE_URL=postgresql://postgres:rtai-db-secret-2026@postgres:5432/authzion?sslmode=disable
          ADMIN_SECRET=runtimeai-dev-secret-2026
          RUNTIMEAI_ADMIN_SECRET=runtimeai-dev-secret-2026
          POSTGRES_USER=postgres
          POSTGRES_PASSWORD=rtai-db-secret-2026
          POSTGRES_DB=authzion
          EOF

          cp ${{ github.workspace }}/runtimeai-enterprise/deployment/docker-compose/.env \
             ${{ github.workspace }}/RuntimeAI/.env

      - name: Start runtimeai-enterprise services
        working-directory: runtimeai-enterprise/deployment/docker-compose
        run: |
          docker compose up -d --build
          echo "Waiting for PostgreSQL..."
          for i in $(seq 1 30); do
            if docker exec docker-compose-postgres-1 pg_isready -U postgres 2>/dev/null; then
              echo "✅ PostgreSQL ready"
              break
            fi
            sleep 2
          done

      - name: Start RuntimeAI services
        working-directory: RuntimeAI
        run: |
          docker compose up -d --build
          sleep 15

      - name: Wait for services
        run: |
          wait_for() {
            local name="$1" url="$2" max=90
            local i=0
            while [ $i -lt $max ]; do
              if curl -sf --connect-timeout 2 "$url" > /dev/null 2>&1; then
                echo "✅ $name ready (${i}s)"
                return 0
              fi
              sleep 3
              i=$((i + 3))
            done
            echo "⚠️  $name timeout after ${max}s"
            return 0
          }

          wait_for "Control Plane (4000)" "http://localhost:4000"
          wait_for "MCP Gateway (8091)"   "http://localhost:8091/healthz"
          wait_for "FinOps (5055)"        "http://localhost:5055/healthz"
          wait_for "AAIC (5056)"          "http://localhost:5056/api/aaic/info"

      - name: Run seed scripts
        run: |
          FELTSENSE_SEED="${RUNTIMEAI_DIR}/Engagements/Feltsense/seed_feltsense_demo.sh"
          if [ -f "$FELTSENSE_SEED" ]; then
            echo "Running Feltsense seed..."
            bash "$FELTSENSE_SEED" || echo "⚠️  Seed had warnings"
          fi

          AAIC_SEED="${RUNTIMEAI_DIR}/auto_ai_compliance/scripts/seed_aaic_demo.sh"
          if [ -f "$AAIC_SEED" ]; then
            echo "Running AAIC seed..."
            bash "$AAIC_SEED" || echo "⚠️  AAIC seed had warnings"
          fi

      - name: Run QA suite
        working-directory: runtimeai-enterprise
        run: |
          if [ -f "qa_testing_local/run_suite.sh" ]; then
            bash qa_testing_local/run_suite.sh || echo "::warning::QA suite had failures"
          fi

      - name: Health check
        run: |
          PASS=0; FAIL=0
          check() {
            local name=$1 url=$2
            code=$(curl -s --connect-timeout 3 -o /dev/null -w "%{http_code}" "$url" 2>/dev/null)
            if [ "$code" != "000" ]; then
              echo "✅ $name — HTTP $code"; PASS=$((PASS + 1))
            else
              echo "❌ $name — unreachable"; FAIL=$((FAIL + 1))
            fi
          }

          echo "══════════════════════════════════════"
          echo "  Integration Health Check"
          echo "══════════════════════════════════════"
          check "Dashboard (4000)"         "http://localhost:4000"
          check "Control Plane API"        "http://localhost:4000/api/agents"
          check "Discovery (8090)"         "http://localhost:8090/"
          check "MCP Gateway (8091)"       "http://localhost:8091/healthz"
          check "FinOps (5055)"            "http://localhost:5055/healthz"
          check "AAIC (5056)"              "http://localhost:5056/api/aaic/info"
          check "Landing Backend (8082)"   "http://localhost:8082/"
          echo "══════════════════════════════════════"
          echo "  $PASS passed / $FAIL failed"
          echo "══════════════════════════════════════"
          if [ $FAIL -gt 0 ]; then echo "::warning::$FAIL service(s) unreachable"; fi

      - name: Collect logs on failure
        if: failure()
        run: |
          docker ps -a
          echo "=== Control Plane ===" && docker logs docker-compose-control-plane-1 --tail 50 2>&1 || true
          echo "=== PostgreSQL ===" && docker logs docker-compose-postgres-1 --tail 30 2>&1 || true

      - name: Stop all services
        if: always()
        run: |
          cd ${{ github.workspace }}/RuntimeAI && docker compose down --remove-orphans || true
          cd ${{ github.workspace }}/runtimeai-enterprise/deployment/docker-compose && docker compose down --remove-orphans || true
