name: Release — RuntimeAI Enterprise

on:
  # ── Manual trigger only (cost containment) ──────────────────────────
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g., v1.0.0). Leave empty for latest commit.'
        required: false
        type: string
  # ── Original auto-triggers (disabled to save CI costs) ──────────────
  # push:
  #   branches:
  #     - main
  #   tags:
  #     - 'v*'

jobs:
  build-push-all:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service:
          - {name: control-plane, context: control-plane}
          - {name: dashboard, context: dashboard}
          - {name: flow-enforcer, context: flow-enforcer}
          - {name: discovery, context: discovery}
          - {name: policy-manager, context: policy-manager}
          - {name: drift-engine, context: services/drift-engine}
          - {name: waf, context: services/waf}
          - {name: data-proxy, context: services/data-proxy}
          - {name: cost-ledger, context: services/cost-ledger}
          - {name: identity-dns, context: services/identity-dns}
          - {name: vendor-wrapper, context: services/vendor-wrapper}
          - {name: bot-ca, context: services/bot-ca}
          - {name: verifier, context: services/verifier}
          - {name: network-analyzer, context: services/network-analyzer}
          - {name: sequence-modeler, context: services/sequence-modeler}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service.context }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/runtimeai-${{ matrix.service.name }}:latest
            ghcr.io/${{ github.repository_owner }}/runtimeai-${{ matrix.service.name }}:${{ github.ref_name }}

  create-release:
    runs-on: ubuntu-latest
    needs: build-push-all
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
