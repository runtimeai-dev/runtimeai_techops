# Publish all RuntimeAI service images to GHCR on version tag push
# Triggered by: git tag v1.0.0 && git push origin v1.0.0
#
# Images are pushed to ghcr.io/runtimeai-dev/<service>:<tag>
# Multi-arch: linux/amd64 + linux/arm64
# Includes cosign signing and SBOM generation

name: Publish Container Images

on:
  push:
    tags:
      - "v*.*.*"

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/runtimeai-dev

permissions:
  contents: read
  packages: write
  id-token: write  # for cosign keyless signing

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: control-plane
            context: control-plane
            dockerfile: control-plane/Dockerfile
          - service: auth-service
            context: control-plane
            dockerfile: control-plane/Dockerfile.auth
          - service: dashboard
            context: dashboard
            dockerfile: dashboard/Dockerfile
          - service: mcp-gateway
            context: mcp_gateway
            dockerfile: mcp_gateway/Dockerfile
          - service: flow-enforcer
            context: flow-enforcer
            dockerfile: flow-enforcer/Dockerfile
          - service: waf
            context: services/waf
            dockerfile: services/waf/Dockerfile
          - service: data-proxy
            context: services/data-proxy
            dockerfile: services/data-proxy/Dockerfile
          - service: cost-ledger
            context: services/cost-ledger
            dockerfile: services/cost-ledger/Dockerfile
          - service: identity-dns
            context: services/identity-dns
            dockerfile: services/identity-dns/Dockerfile
          - service: drift-engine
            context: services/drift-engine
            dockerfile: services/drift-engine/Dockerfile
          - service: discovery-service
            context: discovery
            dockerfile: discovery/Dockerfile
          - service: esign-service
            context: esign-service/esign-service
            dockerfile: esign-service/esign-service/Dockerfile
          - service: marketplace-service
            context: services/marketplace
            dockerfile: services/marketplace/Dockerfile
          - service: ai-finops-service
            context: services/ai-finops
            dockerfile: services/ai-finops/Dockerfile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image with cosign
        run: |
          echo "${{ steps.meta.outputs.tags }}" | while read -r tag; do
            cosign sign --yes "$tag"
          done

      - name: Generate SBOM with syft
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ github.ref_name }}
          format: spdx-json
          output-file: sbom-${{ matrix.service }}.spdx.json

      - name: Attach SBOM to image
        run: |
          cosign attach sbom \
            --sbom sbom-${{ matrix.service }}.spdx.json \
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ github.ref_name }}
