# OPER_RT19-084b1..b6 — Deployments + Services for the 6 MCP servers.
# Each pod registers itself with mcp-gateway via the SDK helper
# (registerWithGateway / RegisterAndHeartbeat) on boot. Resource
# requests sized per the KAI-200 capacity guard (100m / 128Mi each).
# Bot-CA-issued cert mounted at /etc/bot-ca; gateway verifies SAN.
# NetworkPolicy restricts egress to gateway + the server's own
# upstream API (e.g. okta.com, postgres, runtimecrm).

# ---------------- mcp-server-quantosign ----------------
apiVersion: apps/v1
kind: Deployment
metadata: { name: mcp-server-quantosign, namespace: rt19 }
spec:
  replicas: 1
  selector: { matchLabels: { app: mcp-server-quantosign } }
  template:
    metadata: { labels: { app: mcp-server-quantosign } }
    spec:
      containers:
      - name: app
        image: runtimeaicr.azurecr.io/mcp-server-quantosign:latest
        imagePullPolicy: Always
        ports: [{ containerPort: 7001 }]
        env:
        - { name: MCP_GATEWAY_URL, value: "https://mcp-gateway.rt19.svc.cluster.local:8091" }
        - { name: POD_FQDN,        value: "mcp-server-quantosign.rt19.svc.cluster.local" }
        - { name: ESIGN_BASE_URL,  value: "https://esign.rt19.runtimeai.io" }
        - name: ESIGN_API_KEY
          valueFrom: { secretKeyRef: { name: mcp-server-quantosign-secrets, key: ESIGN_API_KEY } }
        resources: { requests: { cpu: 100m, memory: 128Mi }, limits: { cpu: 500m, memory: 512Mi } }
        volumeMounts: [{ name: bot-ca, mountPath: /etc/bot-ca, readOnly: true }]
        livenessProbe:  { httpGet: { path: /healthz, port: 7001 }, initialDelaySeconds: 10, periodSeconds: 30 }
        readinessProbe: { httpGet: { path: /readyz,  port: 7001 }, initialDelaySeconds: 5,  periodSeconds: 10 }
      volumes: [{ name: bot-ca, secret: { secretName: mcp-server-quantosign-bot-ca } }]
---
apiVersion: v1
kind: Service
metadata: { name: mcp-server-quantosign, namespace: rt19 }
spec:
  selector: { app: mcp-server-quantosign }
  ports: [{ port: 7001, targetPort: 7001 }]

