# ---------------- mcp-server-postgresql ----------------
# Runs on a read_only_app role; statement allowlist enforced at the
# server (SELECT, EXPLAIN). Schema-modifying tools live in a separate
# admin server (out of scope for v1).
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: mcp-server-postgresql, namespace: rt19 }
spec:
  replicas: 1
  selector: { matchLabels: { app: mcp-server-postgresql } }
  template:
    metadata: { labels: { app: mcp-server-postgresql } }
    spec:
      containers:
      - name: app
        image: runtimeaicr.azurecr.io/mcp-server-postgresql:latest
        imagePullPolicy: Always
        ports: [{ containerPort: 7005 }]
        env:
        - { name: MCP_GATEWAY_URL, value: "https://mcp-gateway.rt19.svc.cluster.local:8091" }
        - { name: POD_FQDN,        value: "mcp-server-postgresql.rt19.svc.cluster.local" }
        - name: DATABASE_URL_READONLY
          valueFrom: { secretKeyRef: { name: mcp-server-postgresql-secrets, key: DATABASE_URL_READONLY } }
        resources: { requests: { cpu: 100m, memory: 128Mi }, limits: { cpu: 500m, memory: 512Mi } }
        volumeMounts: [{ name: bot-ca, mountPath: /etc/bot-ca, readOnly: true }]
        livenessProbe:  { httpGet: { path: /healthz, port: 7005 }, initialDelaySeconds: 10, periodSeconds: 30 }
        readinessProbe: { httpGet: { path: /readyz,  port: 7005 }, initialDelaySeconds: 5,  periodSeconds: 10 }
      volumes: [{ name: bot-ca, secret: { secretName: mcp-server-postgresql-bot-ca } }]
---
apiVersion: v1
kind: Service
metadata: { name: mcp-server-postgresql, namespace: rt19 }
spec:
  selector: { app: mcp-server-postgresql }
  ports: [{ port: 7005, targetPort: 7005 }]

