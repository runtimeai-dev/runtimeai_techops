# R7-B — Quickstart Redis StatefulSet. NOT FOR PRODUCTION.
{{- if .Values.quickstart.redis.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: redis-quickstart
  labels: { app: redis-quickstart, runtimeai/quickstart: "true" }
spec:
  clusterIP: None
  ports: [{ name: redis, port: 6379, targetPort: 6379 }]
  selector: { app: redis-quickstart }
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis-quickstart
spec:
  serviceName: redis-quickstart
  replicas: 1
  selector: { matchLabels: { app: redis-quickstart } }
  template:
    metadata:
      labels: { app: redis-quickstart, runtimeai/quickstart: "true" }
    spec:
      containers:
      - name: redis
        image: {{ .Values.quickstart.redis.image | quote }}
        args: [--save, "60", "1000", --appendonly, "yes"]
        ports: [{ containerPort: 6379, name: redis }]
        volumeMounts: [{ name: data, mountPath: /data }]
        readinessProbe:
          tcpSocket: { port: 6379 }
          periodSeconds: 5
        livenessProbe:
          tcpSocket: { port: 6379 }
          initialDelaySeconds: 30
  volumeClaimTemplates:
  - metadata: { name: data }
    spec:
      accessModes: [ReadWriteOnce]
      resources: { requests: { storage: 5Gi } }
{{- end }}
