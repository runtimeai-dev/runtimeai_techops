# Control Plane Default Values (Staging)
namespace: rt19
environment: staging
replicas: 2

image:
  registry: runtimeaicr.azurecr.io
  repository: control-plane
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

resources:
  requests:
    cpu: 500m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1Gi

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

affinity:
  podAntiAffinity: soft

pdb:
  enabled: false
  minAvailable: 1

env:
  LOG_LEVEL: info
  DATABASE_URL: postgres://user:pass@postgres:5432/runtimeai
  REDIS_URL: redis://redis:6379
