namespace: rt19
gateway_replicas: 3
image: runtimeaicr.azurecr.io/mcp-gateway:latest
port: 8091

resources:
  requests:
    cpu: 500m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1Gi

# Vendor routing configuration
vendors:
  openai:
    endpoint: https://api.openai.com
    secret_name: openai-api-key
  anthropic:
    endpoint: https://api.anthropic.com
    secret_name: anthropic-api-key
  azure:
    endpoint: https://runtimeai.openai.azure.com
    secret_name: azure-openai-key

# Rate limiting (requests per second per tenant)
rate_limit_rps: 100

# Redis for distributed rate limiter state
redis:
  host: redis
  port: 6379

# QuantumVault for token validation
quantumvault:
  endpoint: http://quantumvault:8200
  secret_name: quantumvault-api-key
