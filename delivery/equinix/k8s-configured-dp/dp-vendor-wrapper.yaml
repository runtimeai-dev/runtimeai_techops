# Auto-generated by configure-environment.sh (DEPLOY_MODE=dataplane-only)
# Vendor wrapper — RBAC proxy for 3rd party LLM/tool calls; enforces OPA policy locally
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vendor-wrapper
  namespace: eqix-rt19
  labels:
    app: vendor-wrapper
    tier: dataplane
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vendor-wrapper
  template:
    metadata:
      labels:
        app: vendor-wrapper
        tier: dataplane
    spec:
      imagePullSecrets:
        - name: rt19-registry-secret
      containers:
        - name: vendor-wrapper
          image: runtimeaicr.azurecr.io/vendor-wrapper:latest
          ports:
            - containerPort: 8103
          env:
            - name: CONTROL_PLANE_URL
              valueFrom:
                secretKeyRef:
                  name: rt19-cp-connectivity
                  key: CONTROL_PLANE_URL
            - name: INTERNAL_SERVICE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: rt19-cp-connectivity
                  key: INTERNAL_SERVICE_TOKEN
            - name: OPA_URL
              value: "http://opa:8181"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: rt19-db-secret
                  key: DATABASE_URL
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8103
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  # Named vw-proxy to avoid K8s env collision (VENDOR_WRAPPER_PORT=tcp://...)
  name: vw-proxy
  namespace: eqix-rt19
  labels:
    app: vendor-wrapper
spec:
  selector:
    app: vendor-wrapper
  ports:
    - port: 8103
      targetPort: 8103
