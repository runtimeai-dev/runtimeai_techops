# Auto-generated by configure-environment.sh (DEPLOY_MODE=dataplane-only)
# Bundle cache — pulls OPA bundles from CP (GET /opa/bundles/{tenant_id}/bundle.tar.gz)
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bundle-cache
  namespace: eqix-rt19
  labels:
    app: bundle-cache
    tier: dataplane
    component: policy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bundle-cache
  template:
    metadata:
      labels:
        app: bundle-cache
        tier: dataplane
    spec:
      imagePullSecrets:
        - name: rt19-registry-secret
      containers:
        - name: bundle-cache
          image: runtimeaicr.azurecr.io/bundle-cache:latest
          ports:
            - containerPort: 8094
          env:
            - name: POLICY_MANAGER
              value: "https://api.rt19.runtimeai.io"
            - name: POLL_SECONDS
              value: "30"
            - name: API_KEY_SECRET
              valueFrom:
                secretKeyRef:
                  name: rt19-app-secrets
                  key: JWT_SECRET
            - name: OPA_URL
              value: "http://opa:8181"
            - name: OPA_RESYNC_SECONDS
              value: "60"
            - name: DEPLOY_MODE
              value: "dataplane-only"
            - name: CONTROL_PLANE_URL
              valueFrom:
                secretKeyRef:
                  name: rt19-cp-connectivity
                  key: CONTROL_PLANE_URL
            - name: INTERNAL_SERVICE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: rt19-cp-connectivity
                  key: INTERNAL_SERVICE_TOKEN
            - name: ADMIN_SECRET
              valueFrom:
                secretKeyRef:
                  name: rt19-cp-connectivity
                  key: ADMIN_SECRET
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: rt19-app-secrets
                  key: REDIS_URL
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8094
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8094
            initialDelaySeconds: 20
            periodSeconds: 30
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: bundle-cache
  namespace: eqix-rt19
  labels:
    app: bundle-cache
spec:
  selector:
    app: bundle-cache
  ports:
    - port: 8094
      targetPort: 8094
