# Open Policy Agent — runtime policy engine
# Used by: control-plane (policy enforcement), bundle-cache (policy distribution),
#           flow-enforcer (envoy ext_authz), vendor-wrapper (RBAC checks)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: opa
  namespace: eqix-rt19
  labels:
    app: opa
spec:
  replicas: 1
  selector:
    matchLabels:
      app: opa
  template:
    metadata:
      labels:
        app: opa
    spec:
      imagePullSecrets:
        - name: rt19-registry-secret
      containers:
        - name: opa
          image: openpolicyagent/opa:0.70.0-static
          args:
            - run
            - --server
            - --addr=0.0.0.0:8181
            - --log-level=info
          ports:
            - containerPort: 8181
          livenessProbe:
            httpGet:
              path: /health
              port: 8181
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8181
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: opa
  namespace: eqix-rt19
spec:
  selector:
    app: opa
  ports:
    - port: 8181
      targetPort: 8181
  type: ClusterIP
