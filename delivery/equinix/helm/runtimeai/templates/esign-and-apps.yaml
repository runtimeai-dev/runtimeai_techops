{{/* eSign PVC — only created when storageBackend is "local" */}}
{{- if eq .Values.esignService.storageBackend "local" }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: esign-documents-pvc
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "runtimeai.labels" . | nindent 4 }}
    app: esign-service
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.esignService.persistence.size | default "10Gi" }}
  {{- if .Values.global.storageClass }}
  storageClassName: {{ .Values.global.storageClass }}
  {{- end }}
---
{{- end }}
{{/* eSign Service */}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: esign-service
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "runtimeai.labels" . | nindent 4 }}
    app: esign-service
spec:
  replicas: {{ .Values.esignService.replicas }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: esign-service
  template:
    metadata:
      labels:
        app: esign-service
    spec:
      {{- if .Values.global.imagePullSecret }}
      imagePullSecrets:
        - name: {{ .Values.global.imagePullSecret }}
      {{- end }}
      containers:
        - name: esign-service
          image: {{ include "runtimeai.image" (dict "registry" .Values.global.registry "name" "esign-service" "tag" .Values.global.imageTag) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.esignService.port }}
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.dbSecret }}
                  key: DATABASE_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.appSecret }}
                  key: JWT_SECRET
            - name: STORAGE_BACKEND
              value: {{ .Values.esignService.storageBackend | quote }}
            - name: STORAGE_PATH
              value: {{ .Values.esignService.storagePath | quote }}
            - name: STORAGE_SIGNING_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.emailSecret }}
                  key: STORAGE_SIGNING_SECRET
            - name: ESIGN_BASE_URL
              value: "https://{{ include "runtimeai.esignDomain" . }}"
            - name: AUTH_SERVICE_URL
              value: "http://auth-svc:{{ .Values.authService.port }}"
            - name: PORT
              value: {{ .Values.esignService.port | quote }}
            - name: CORS_ALLOWED_ORIGINS
              value: "https://{{ include "runtimeai.esignDomain" . }},https://{{ include "runtimeai.appDomain" . }}"
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.appSecret }}
                  key: REDIS_URL
            - name: BILLING_SERVICE_URL
              value: "http://billing-service:{{ .Values.billing.port }}"
            - name: LOG_LEVEL
              value: "info"
          readinessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.esignService.port }}
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.esignService.port }}
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            {{- toYaml .Values.esignService.resources | nindent 12 }}
          {{- if eq .Values.esignService.storageBackend "local" }}
          volumeMounts:
            - name: esign-data
              mountPath: {{ .Values.esignService.storagePath | default "/data/esign" }}
          {{- end }}
      {{- if eq .Values.esignService.storageBackend "local" }}
      volumes:
        - name: esign-data
          persistentVolumeClaim:
            claimName: esign-documents-pvc
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: esign-service
  namespace: {{ .Values.global.namespace }}
spec:
  selector:
    app: esign-service
  ports:
    - port: {{ .Values.esignService.port }}
      targetPort: {{ .Values.esignService.port }}
  type: ClusterIP
---
