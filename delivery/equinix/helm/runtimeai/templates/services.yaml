        - name: {{ .Values.global.imagePullSecret }}
      {{- end }}
      containers:
        - name: discovery
          image: {{ include "runtimeai.image" (dict "registry" .Values.global.registry "name" "discovery" "tag" .Values.global.imageTag) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.discovery.port }}
